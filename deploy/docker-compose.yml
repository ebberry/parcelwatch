# Production stack for a single AWS Lightsail instance.
# Run from the repo root:
#   docker compose --env-file deploy/.env.production -f deploy/docker-compose.yml up -d --build
#
# Caddy terminates TLS (free Let's Encrypt for ${DOMAIN}) and proxies to the
# Next web service. The worker shares the web image; Postgres + Redis persist to
# named volumes. Nothing but Caddy is exposed to the host.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: parcelwatch:latest
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: parcelwatch:latest
    restart: unless-stopped
    command: ["npm", "run", "worker:prod"]
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: parcelwatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: parcelwatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcelwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
